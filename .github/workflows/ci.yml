name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Lint & Test (Client)
  # ─────────────────────────────────────────
  client-ci:
    name: Client — Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Prettier check
        run: npx prettier --check "src/**/*.{js,jsx}" --config ../.prettierrc
        continue-on-error: true   # formatting is advisory; doesn't block CI

      - name: Run unit tests
        run: npm test

      - name: Build (production smoke test)
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.example.com/api
          VITE_SERVER_URL: https://placeholder.example.com

  # ─────────────────────────────────────────
  # JOB 2 — Lint & Test (Server)
  # ─────────────────────────────────────────
  server-ci:
    name: Server — Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Prettier check
        run: npx prettier --check "**/*.js" --config ../.prettierrc --ignore-path ../.prettierignore
        continue-on-error: true   # formatting is advisory; doesn't block CI

      - name: Run unit tests
        run: npm run test:unit
        env:
          JWT_SECRET: test_secret_ci
          JWT_REFRESH_SECRET: test_refresh_secret_ci
          NODE_ENV: test

      - name: Run integration tests
        run: npm run test:integration
        env:
          JWT_SECRET: test_secret_ci
          JWT_REFRESH_SECRET: test_refresh_secret_ci
          NODE_ENV: test
          # MONGO_URI intentionally omitted — integration tests handle missing DB gracefully

  # ─────────────────────────────────────────
  # JOB 3 — Deploy to ECS Fargate (main only)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to ECS Fargate
    runs-on: ubuntu-latest
    needs: [client-ci, server-ci]          # Only deploy if both CI jobs pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      AWS_REGION: us-east-1

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init and Apply
        id: terraform
        working-directory: terraform
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Extract Terraform Outputs
        id: tf_outputs
        working-directory: terraform
        run: |
          echo "ECR_REPO=$(terraform output -raw ecr_repository_url)" >> $GITHUB_ENV
          echo "CLUSTER_NAME=$(terraform output -raw ecs_cluster_name)" >> $GITHUB_ENV
          echo "SERVICE_NAME=$(terraform output -raw ecs_service_name)" >> $GITHUB_ENV

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        working-directory: server
        run: |
          docker build -t commercio-server .
          docker tag commercio-server:latest $ECR_REPO:latest
          docker push $ECR_REPO:latest

      - name: Force new deployment on ECS
        run: |
          aws ecs update-service \
            --cluster $CLUSTER_NAME \
            --service $SERVICE_NAME \
            --force-new-deployment
