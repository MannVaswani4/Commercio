name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Lint & Test (Client)
  # ─────────────────────────────────────────
  client-ci:
    name: Client — Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Prettier check
        run: npx prettier --check "src/**/*.{js,jsx}" --config ../.prettierrc
        continue-on-error: true   # formatting is advisory; doesn't block CI

      - name: Run unit tests
        run: npm test

      - name: Build (production smoke test)
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.example.com/api
          VITE_SERVER_URL: https://placeholder.example.com

  # ─────────────────────────────────────────
  # JOB 2 — Lint & Test (Server)
  # ─────────────────────────────────────────
  server-ci:
    name: Server — Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Prettier check
        run: npx prettier --check "**/*.js" --config ../.prettierrc --ignore-path ../.prettierignore
        continue-on-error: true   # formatting is advisory; doesn't block CI

      - name: Run unit tests
        run: npm run test:unit
        env:
          JWT_SECRET: test_secret_ci
          JWT_REFRESH_SECRET: test_refresh_secret_ci
          NODE_ENV: test

      - name: Run integration tests
        run: npm run test:integration
        env:
          JWT_SECRET: test_secret_ci
          JWT_REFRESH_SECRET: test_refresh_secret_ci
          NODE_ENV: test
          # MONGO_URI intentionally omitted — integration tests handle missing DB gracefully

  # ─────────────────────────────────────────
  # JOB 3 — Deploy to AWS EC2 (main only)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [client-ci, server-ci]          # Only deploy if both CI jobs pass
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          port: 22
          script: |
            set -e
            echo "=== Pulling latest code ==="
            cd /home/${{ secrets.EC2_USER }}/Commercio
            git pull origin main

            echo "=== Installing server dependencies ==="
            cd server
            npm ci --omit=dev

            echo "=== Installing client dependencies & building ==="
            cd ../client
            npm ci
            npm run build

            echo "=== Restarting server with PM2 ==="
            cd ../server
            pm2 describe commercio > /dev/null 2>&1 \
              && pm2 restart commercio \
              || pm2 start server.js --name commercio

            pm2 save
            echo "=== Deployment complete ==="
